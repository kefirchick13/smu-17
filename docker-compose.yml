# Переменные для подстановки (${APP_HOST_PORT}, ${POSTGRES_PORT}) и env_file: .env
# APP_HOST_PORT — только для Docker (хост-порт веб-контейнера). На Netlify не задавайте:
# значение порта часто совпадает с подстроками в бандле и ломает secret scanning.
# читаются из файла `.env` в корне проекта (скопируйте из `.env.example`).
# При необходимости: docker compose --env-file ./.env.local up

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_HOST_PORT:-3000}:3000"

volumes:
  pgdata: # Volume для хранения данных PostgreSQL
